function uid(){return 'id_'+Math.random().toString(36).slice(2)+Date.now().toString(36)}
function pad2(n){return String(n).padStart(2,'0')}
function todayNepaliLike(){
  // Default date is today's B.S. date converted from today's AD date.
  return adToBsLocal(new Date()) || '२०८३-०२-२४';
}
function bsToAdLocal(bsInput){
  const parsed=parseYmd(toEng(String(bsInput||'')));
  if(!parsed) return '';
  const anchorAd=new Date(2026,5,7); // 2026-06-07
  let bs={y:parsed.y,m:parsed.m,d:parsed.d};
  const target={y:parsed.y,m:parsed.m,d:parsed.d};
  let current={y:2083,m:2,d:24};
  function ml(y,m){return (BS_MONTH_LENGTHS[y]&&BS_MONTH_LENGTHS[y][m-1])||30}
  let diff=0;
  while(current.y!==target.y||current.m!==target.m||current.d!==target.d){
    if(current.y<target.y||current.y===target.y&&current.m<target.m||current.y===target.y&&current.m===target.m&&current.d<target.d){
      current.d++;
      if(current.d>ml(current.y,current.m)){current.d=1;current.m++;if(current.m>12){current.m=1;current.y++;}}
      diff++;
    } else {
      current.d--;
      if(current.d<1){current.m--;if(current.m<1){current.m=12;current.y--;}current.d=ml(current.y,current.m);}
      diff--;
    }
  }
  const ad=new Date(anchorAd);
  ad.setDate(ad.getDate()+diff);
  return `${ad.getFullYear()}-${pad2(ad.getMonth()+1)}-${pad2(ad.getDate())}`;
}
function parseYmd(s=''){
  const m=toEng(String(s||'')).trim().match(/(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})/);
  return m?{y:+m[1],m:+m[2],d:+m[3]}:null;
}
function isLikelyAdDate(s=''){
  const p=parseYmd(s); return !!(p && p.y>=1900 && p.y<2050);
}
function bsToYmdString(bs){return bs?`${toNep(bs.y)}-${toNep(pad2(bs.m))}-${toNep(pad2(bs.d))}`:''}
function adToBsLocal(adInput){
  const ad=(adInput instanceof Date)?new Date(adInput.getFullYear(),adInput.getMonth(),adInput.getDate()):(()=>{const p=parseYmd(adInput);return p?new Date(p.y,p.m-1,p.d):null})();
  if(!ad || isNaN(ad)) return '';
  const anchorAd=new Date(2026,5,7); // 2026-06-07
  let bs={y:2083,m:2,d:24};       // 2083-02-24
  let diff=Math.round((ad-anchorAd)/86400000);
  function ml(y,m){return (BS_MONTH_LENGTHS[y]&&BS_MONTH_LENGTHS[y][m-1])||30}
  if(diff>=0){while(diff-- >0){bs.d++; if(bs.d>ml(bs.y,bs.m)){bs.d=1;bs.m++; if(bs.m>12){bs.m=1;bs.y++;}}}}
  else{while(diff++ <0){bs.d--; if(bs.d<1){bs.m--; if(bs.m<1){bs.m=12;bs.y--;} bs.d=ml(bs.y,bs.m);}}}
  return bsToYmdString(bs);
}
function formatItiDate(input=''){
  const raw=String(input||'').trim();
  if(/^इति\s+संवत्?/.test(raw)) return raw;
  let s=raw || todayNepaliLike();
  if(isLikelyAdDate(s)) s=adToBsLocal(s) || s;
  const p=parseYmd(s);
  if(!p) return `इति संवत् ${toNep(s)} शुभम्`;
  const monthName=bsMonths[p.m]||toNep(p.m);
  // रोज: Sunday = १, Monday = २ ... Saturday = ७.
  let roj;
  if(isLikelyAdDate(raw)){
    const adp=parseYmd(raw);
    roj=new Date(adp.y,adp.m-1,adp.d).getDay()+1;
  } else {
    const adDate=bsToAdLocal(s);
    if(adDate){
      const adp=parseYmd(adDate);
      roj=new Date(adp.y,adp.m-1,adp.d).getDay()+1;
    } else {
      roj=new Date().getDay()+1;
    }
  }
  return `इति संवत् ${toNep(p.y)} साल ${monthName} महिना ${toNep(p.d)} गते रोज ${toNep(roj)} शुभम्`;
}
function toEng(s=''){return String(s).replace(/[०-९]/g,ch=>nepMap[ch]||ch)}
function toNep(s=''){return String(s).replace(/[0-9]/g,ch=>engToNep[ch]||ch)}
function normCase(s=''){return toEng(cleanCaseNo(String(s))).replace(/\s+/g,'').toUpperCase()}
function cleanCaseNo(s=''){return String(s||'').replace(/[\r\n]+/g,' ').replace(/\([^)]*\)/g,'').replace(/\s+/g,' ').trim()}
function extractRegNo(s=''){const m=String(s||'').match(/\(([^)]*)\)/);return m?m[1].trim():''}
function extractRegistrationNo(caseNoCell=''){return extractRegNo(caseNoCell)}
function headerKey(s=''){return toEng(String(s||'')).toLowerCase().replace(/[.।:ः\-_/()\[\]\s]/g,'')}
function getCellByHeader(row,headers,possibleHeaderNames=[],fallback=''){
  const hs=(headers||[]).map(headerKey);
  function badMatch(h,nk){
    if(nk==='वादी' && /प्रतिवादी|विपक्षी|defendant|respondent|opposite/.test(h))return true;
    if(nk==='मुद्दा' && /मुद्दान|मुद्दानं|मुद्दानम्बर|caseno|casenumber/.test(h))return true;
    return false;
  }
  for(const name of possibleHeaderNames){
    const nk=headerKey(name); if(!nk)continue;
    const i=hs.findIndex(h=>h===nk && !badMatch(h,nk));
    if(i>=0 && row[i]!==undefined && String(row[i]??'').trim()!=='')return row[i];
  }
  for(const name of possibleHeaderNames){
    const nk=headerKey(name); if(!nk)continue;
    const i=hs.findIndex(h=>!badMatch(h,nk) && (h.includes(nk) || (nk.length>4 && nk.includes(h))));
    if(i>=0 && row[i]!==undefined && String(row[i]??'').trim()!=='')return row[i];
  }
  return fallback;
}

function formatDecisionItiDate(date){

}

function renderTabs(){const tabs=document.getElementById('tabs');tabs.innerHTML=state.groups.map((g,i)=>`<button class="tab ${state.activeIndex===i&&state.activeType==='preview'?'active':''}" onclick="openTab(${i},'preview')">Preview${g.no} <span class="badge">${previewCountText(g)}</span></button>`).join('');renderToolsMenu();}
function renderToolsMenu(){const menu=document.getElementById('toolsMenu');if(!menu)return;const g=state.groups[state.activeIndex];menu.innerHTML=`<button class="btn sm" onclick="openTab(${state.activeIndex},'input');toggleToolsMenu(false)">⌨️ InputTable${g.no}</button><button class="btn sm" onclick="openTab(${state.activeIndex},'parsed');toggleToolsMenu(false)">📊 Parsed Table${g.no}</button><button class="btn sm" onclick="openTab(${state.activeIndex},'history');toggleToolsMenu(false)">🗂️ History${g.no}</button><button class="btn sm primary" onclick="addTableGroup();toggleToolsMenu(false)">＋ Add Table</button>`;const btn=document.getElementById('toolsBtn');if(btn){btn.setAttribute('aria-expanded',!menu.classList.contains('hidden'));}}
function toggleToolsMenu(open){const menu=document.getElementById('toolsMenu');if(!menu)return;const btn=document.getElementById('toolsBtn');const isOpen=!menu.classList.contains('hidden');const shouldOpen=open===undefined?!isOpen:!!open;menu.classList.toggle('hidden',!shouldOpen);if(btn){btn.setAttribute('aria-expanded',shouldOpen);}if(shouldOpen){renderToolsMenu();}}
window.addEventListener('click',e=>{const btn=document.getElementById('toolsBtn');const menu=document.getElementById('toolsMenu');if(!btn||!menu)return; if(!btn.contains(e.target) && !menu.contains(e.target)){toggleToolsMenu(false);}})
function saveCurrentPreviewState(){if(state.activeType!=='preview')return;const g=state.groups[state.activeIndex];if(!g)return;if(!state.previewStates)state.previewStates={};const prev=state.previewStates[g.no]||{};state.previewStates[g.no]={...prev,scrollY:window.scrollY||document.documentElement.scrollTop||0,activePreviewId:state.activePreviewId||'',tableFocus:state.tableFocus||null};rememberPreviewCursor(state.activePreviewId,{silent:true});}
function restorePreviewState(groupNo){const ps=(state.previewStates||{})[groupNo];if(!ps)return;if(ps.activePreviewId){state.activePreviewId=ps.activePreviewId;setActivePreview(ps.activePreviewId,{noScroll:true,noSave:true});}
  if(typeof ps.scrollY==='number')setTimeout(()=>window.scrollTo({top:ps.scrollY,behavior:'auto'}),20);}
function openTab(i,type){saveCurrentPreviewState();state.activeIndex=i;state.activeType=type;render()}
function addTableGroup(){state.groups.push(newGroup(state.groups.length+1));state.activeIndex=state.groups.length-1;state.activeType='input';state.settings.date=todayNepaliLike();render();toast(`InputTable${state.groups.length} थपियो`,'ok')}
function removeTableGroup(no){
  const idx=state.groups.findIndex(g=>g.no===no);
  if(idx<0)return;
  const label='InputTable'+no;
  confirmBox(label+' हटाउने?', 'यस table सँग सम्बन्धित input, preview र history हट्छ।', ()=>{
    if(state.groups.length<=1){
      state.groups=[newGroup(1)];
      state.activeIndex=0;
      state.activeType='input';
      render();
      toast('एक मात्र table reset गरियो।','ok');
      return;
    }
    state.groups.splice(idx,1);
    state.groups.forEach((g,i)=>{g.no=i+1});
    state.activeIndex=Math.min(idx,state.groups.length-1);
    state.activeType='input';
    render();
    toast(label+' हटाइयो।','ok');
  });
}

  if(meta.date && !g.inputDateManual && (!g.settings || !String(g.settings.date||'').trim())){ensureGroupSettings(g);g.settings.date=meta.date;}

  <div class="panel-body"><div class="grid"><div><label>Parse Mode</label><select id="mode"><option value="auto">Auto Detect</option><option value="html">HTML Table</option><option value="json">JSON Array</option><option value="text">Plain Text / TSV</option></select></div><div><label>अदालत / Court</label><input id="inputCourt" placeholder="Source code को h1 बाट auto-fill" value="${safe(s.court||meta.court||'')}"></div><div><label>पेशी मिति / Date</label><input id="inputDate" placeholder="२०८३-०२-२९ वा २०८३०२२९" value="${safe(normalizeDateInput(s.date||meta.date||todayNepaliLike()))}"></div><div><label>Status</label><div class="badge warn">Rows: ${g.rows.length} | Preview: ${g.previews.length} | History: ${g.history.length}</div></div></div><div style="margin-top:10px"><label>Serial / Case Selection</label><input id="selectedText" placeholder="खाली = default rows; 1,2 वा 072-WO-0294" value="${safe(g.selectedText)}"></div><div id="benchSourceWrap" style="margin-top:10px">${benchSourceSelectHtml(g,blocks)}</div><br><label>Cause List Data Paste गर्नुहोस्</label><textarea id="inputText" placeholder="HTML source code, HTML table, JSON array, copied table text, वा manually typed cause list यहाँ paste गर्नुहोस्...">${safe(g.input)}</textarea><p class="hint">Tip: source code paste गर्दा <span class="kbd">pesi_date</span> बाट मिति र <span class="kbd">h1</span> बाट अदालत स्वतः भरिन्छ। Date मा <span class="kbd">yyyy-mm-dd</span> वा <span class="kbd">yyyymmdd</span> दुवै स्वीकार हुन्छ। धेरै causelist table भएमा Bench/Judge dropdown बाट चाहिएको causelist छान्नुहोस्। Settings को <span class="kbd">इजलास</span> manual/independent रहन्छ र source-code bench बाट overwrite हुँदैन।</p></div></div>`}
function parsedView(g){return `<div class="panel"><div class="panel-head"><div class="panel-title">📊 Parsed Table${g.no}</div><div class="preview-tools"><button class="btn" onclick="openTab(${state.activeIndex},'input')">← InputTable${g.no}</button><button class="btn primary" onclick="generatePreview(${g.no})">⚡ Generate Preview</button></div></div><div class="panel-body">${tableHtml(g)}</div></div>`}
function bindAfterRender(){
  const g=state.groups[state.activeIndex];
  const input=document.getElementById('inputText');
  if(input)input.addEventListener('input',e=>{
    g.input=e.target.value;
    applySourceMetaToGroup(g,{overwriteManual:false,updateDom:true});
    updateInputSourceBlocks(g.no);
    saveState();
  });
  const mode=document.getElementById('mode');
  if(mode){mode.value=g.mode||'auto';mode.addEventListener('change',e=>{g.mode=e.target.value;updateInputSourceBlocks(g.no);saveState()})}
  const st=document.getElementById('selectedText');
  if(st)st.addEventListener('input',e=>{g.selectedText=e.target.value;saveState()});
  const court=document.getElementById('inputCourt');
  if(court)court.addEventListener('input',e=>{ensureGroupSettings(g);g.settings.court=e.target.value;g.inputCourtManual=true;saveState()});
  const date=document.getElementById('inputDate');
  if(date)date.addEventListener('input',e=>{ensureGroupSettings(g);g.settings.date=normalizeDateInput(e.target.value);g.inputDateManual=true;saveState()});

function clearInput(no){confirmBox('Input खाली गर्ने?','यो कार्यले input text खाली गर्छ। History मेटिँदैन।',()=>{const g=getGroup(no);g.input='';g.rows=[];g.headers=[];g.previews=[];g.sourceBlocks=[];g.selectedSourceBlock='';g.inputCourtManual=false;g.inputDateManual=false;render();toast('Input खाली गरियो','ok')})}
function usePreviousInput(no){const idx=state.groups.findIndex(g=>g.no===no);for(let i=idx-1;i>=0;i--){if(state.groups[i].input.trim()){state.groups[idx].input=state.groups[i].input;state.groups[idx].inputCourtManual=false;state.groups[idx].inputDateManual=false;applySourceMetaToGroup(state.groups[idx],{overwriteManual:false,updateDom:false});render();toast('Previous input load भयो','ok');return}}toast('Previous input भेटिएन')}
function loadSampleData(no){const g=getGroup(no);if(!g)return;g.input=SAMPLE_CAUSELIST_HTML;g.mode='html';g.inputCourtManual=false;g.inputDateManual=false;applySourceMetaToGroup(g,{overwriteManual:false,updateDom:false});state.activeIndex=state.groups.findIndex(x=>x.no===no);state.activeType='input';render();toast('Sample cause list load भयो। Preview auto populate हुँदैछ।','ok');setTimeout(()=>generatePreview(no),80)}
function getGroup(no){return state.groups.find(g=>g.no===no)}

function generatePreview(no){
  const g=getGroup(no);
  if(!g)return;
  ensureGroupSettings(g);
  g.input=document.getElementById('inputText')?.value||g.input;
  g.mode=document.getElementById('mode')?.value||g.mode;
  g.selectedText=document.getElementById('selectedText')?.value||g.selectedText;
  const courtVal=document.getElementById('inputCourt')?.value;
  const dateVal=document.getElementById('inputDate')?.value;
  if(courtVal!==undefined){g.settings.court=String(courtVal||'').trim()||g.settings.court;}
  if(dateVal!==undefined){g.settings.date=normalizeDateInput(dateVal)||g.settings.date||todayNepaliLike();}
  applySourceMetaToGroup(g,{overwriteManual:false,updateDom:false});
  const selected=document.getElementById('benchSourceSelect')?.value;
  if(selected!==undefined)g.selectedSourceBlock=selected;
  const parsed=parseInputForSelectedSource(g);
  g.headers=parsed.headers;
  g.rows=parsed.rows;
  if(parsed.sourceBlock){
    g.activeSourceBlock=parsed.sourceBlock.id;
    // V3: judge may follow the selected causelist, but bench/इजलास is independent manual setting.
    g.settings={...(g.settings||state.settings),bench:(g.settings&&g.settings.bench)||'इजलास',judge:((g.settings||{}).judge||state.settings.judge||DEFAULT_JUDGE)};
  }
  if(!g.rows.length){render();toast('Cause list rows भेटिएन। Input format वा selected bench/judge जाँच्नुहोस्।','danger');return}
  if(!String(g.settings.date||'').trim())g.settings.date=todayNepaliLike();
  if(!String(g.settings.bench||'').trim())g.settings.bench='इजलास';
  const chosen=eligibleRows(g);
  g.previews=chosen.map((row,idx)=>makePreview(g,row,idx));
  state.activeType='preview';
  render();
  const blockInfo=parsed.sourceBlock?` (${parsed.sourceBlock.label})`:'';
  toast(`Preview${g.no}: ${g.previews.length} आदेश तयार भयो${blockInfo}`,'ok');
}

function normalizeDateInput(input=''){
  let s=toEng(String(input||'').trim()).replace(/[\/\.]/g,'-');
  const compact=s.replace(/[^0-9]/g,'');
  if(/^\d{8}$/.test(compact))s=compact.slice(0,4)+'-'+compact.slice(4,6)+'-'+compact.slice(6,8);
  const p=parseYmd(s);
  if(!p)return toNep(String(input||'').trim());
  return toNep(`${p.y}-${pad2(p.m)}-${pad2(p.d)}`);
}
function extractSourceMeta(raw=''){
  raw=String(raw||'');
  const meta={court:'',date:''};
  if(!raw.trim())return meta;
  try{
    const doc=new DOMParser().parseFromString(raw,'text/html');
    const h1=[...doc.querySelectorAll('h1')].map(x=>x.textContent.trim().replace(/\s+/g,' ')).find(Boolean);
    if(h1)meta.court=h1;
    const dateInput=doc.querySelector('#pesi_date,input[name="pesi_date"],input[id*="pesi_date"]');
    if(dateInput && dateInput.getAttribute('value'))meta.date=normalizeDateInput(dateInput.getAttribute('value'));
  }catch(e){}
  if(!meta.court){const m=raw.match(/<h1[^>]*>([\s\S]*?)<\/h1>/i);if(m)meta.court=htmlToText(m[1]).trim();}
  if(!meta.date){const m=raw.match(/<input[^>]*(?:id|name)=["']pesi_date["'][^>]*value=["']([^"']+)["'][^>]*>/i)||raw.match(/<input[^>]*value=["']([^"']+)["'][^>]*(?:id|name)=["']pesi_date["'][^>]*>/i);if(m)meta.date=normalizeDateInput(m[1]);}
  return meta;
}
function applySourceMetaToGroup(g,opts={}){
  if(!g)return;
  ensureGroupSettings(g);
  const meta=extractSourceMeta(g.input);
  const overwrite=!!opts.overwriteManual;
  if(meta.court && (overwrite || !g.inputCourtManual)){
    g.settings.court=meta.court;
    if(opts.updateDom){const el=document.getElementById('inputCourt');if(el)el.value=meta.court;}
  }
  if(meta.date && (overwrite || !g.inputDateManual)){
    g.settings.date=meta.date;
    if(opts.updateDom){const el=document.getElementById('inputDate');if(el)el.value=meta.date;}
  }
}
function sourceModeLooksHtml(g){const mode=(g&&g.mode)||'auto';const raw=String((g&&g.input)||'');return mode==='html'||(mode==='auto'&&/<table[\s\S]*?>/i.test(raw))}
function sourceBlocksForView(g){if(!sourceModeLooksHtml(g))return [];const blocks=extractSourceCauselistBlocks(g.input);g.sourceBlocks=blocks;if(blocks.length && g.selectedSourceBlock!==ALL_SOURCE_BLOCKS && !blocks.some(b=>b.id===g.selectedSourceBlock))g.selectedSourceBlock=blocks[0].id;return blocks}
function sameHeaderKey(h=''){return String(h||'').replace(/\s+/g,' ').trim().toLowerCase()}
function mergeSourceBlocks(blocks){blocks=(blocks||[]).filter(Boolean);const headers=[];const keySet=new Set();blocks.forEach(b=>(b.headers||[]).forEach(h=>{const key=sameHeaderKey(h);if(key&&!keySet.has(key)){keySet.add(key);headers.push(h)}}));const rows=[];blocks.forEach(b=>{(b.rows||[]).forEach((row,sourceRowIndex)=>{const merged=headers.map(h=>{const idx=(b.headers||[]).findIndex(x=>sameHeaderKey(x)===sameHeaderKey(h));return idx>=0?(row[idx]||''):''});merged._sourceBlockId=b.id;merged._sourceBlockLabel=b.label||'';merged._sourceRowIndex=sourceRowIndex;rows.push(merged);});});return {headers,rows,sourceBlock:{id:ALL_SOURCE_BLOCKS,label:'सबै',bench:'',judge:'',rows,headers}}}
function benchSourceSelectHtml(g,blocks){blocks=blocks||[];if(!blocks.length)return `<div class="hint">Source code मा bench/judge causelist block भेटिएमा यहाँ dropdown देखिन्छ।</div>`;const allOpt=blocks.length>1?`<option value="${ALL_SOURCE_BLOCKS}" ${g.selectedSourceBlock===ALL_SOURCE_BLOCKS?'selected':''}>सबै</option>`:'';const opts=blocks.map((b,i)=>`<option value="${safe(b.id)}" ${b.id===g.selectedSourceBlock?'selected':''}>${safe(b.label||('Causelist '+(i+1)))}</option>`).join('');return `<label>Bench / Judge Causelist Selection</label><select id="benchSourceSelect">${allOpt}${opts}</select><p class="hint">${blocks.length} वटा causelist block भेटियो। <span class="kbd">सबै</span> छानेमा सबै table जोडिएर integrated parsed table र preview बन्छ।</p>`}
function updateInputSourceBlocks(no){const g=getGroup(no);if(!g)return;const wrap=document.getElementById('benchSourceWrap');const blocks=sourceBlocksForView(g);if(wrap)wrap.innerHTML=benchSourceSelectHtml(g,blocks);const bs=document.getElementById('benchSourceSelect');if(bs){bs.value=g.selectedSourceBlock||'';bs.onchange=e=>{g.selectedSourceBlock=e.target.value;applySelectedSourceBlock(g);saveState();};}}
function applySelectedSourceBlock(g){if(!g)return;ensureGroupSettings(g);const blocks=g.sourceBlocks||[];if(g.selectedSourceBlock===ALL_SOURCE_BLOCKS){const merged=mergeSourceBlocks(blocks);g.headers=merged.headers;g.rows=merged.rows;g.activeSourceBlock=ALL_SOURCE_BLOCKS;return;}const block=blocks.find(b=>b.id===g.selectedSourceBlock);if(block){g.headers=block.headers||[];g.rows=(block.rows||[]).map((row,sourceRowIndex)=>{const r=row.slice();r._sourceBlockId=block.id;r._sourceBlockLabel=block.label||'';r._sourceRowIndex=sourceRowIndex;return r;});g.activeSourceBlock=block.id;g.settings={...(g.settings||state.settings),bench:(g.settings&&g.settings.bench)||'इजलास',judge:((g.settings||{}).judge||state.settings.judge||DEFAULT_JUDGE)};}}
function parseInputForSelectedSource(g){const mode=g.mode||'auto';if(sourceModeLooksHtml(g)){const blocks=extractSourceCauselistBlocks(g.input);g.sourceBlocks=blocks;if(blocks.length){if(g.selectedSourceBlock===ALL_SOURCE_BLOCKS)return mergeSourceBlocks(blocks);if(!blocks.some(b=>b.id===g.selectedSourceBlock))g.selectedSourceBlock=blocks[0].id;const block=blocks.find(b=>b.id===g.selectedSourceBlock)||blocks[0];const rows=(block.rows||[]).map((row,sourceRowIndex)=>{const r=row.slice();r._sourceBlockId=block.id;r._sourceBlockLabel=block.label||'';r._sourceRowIndex=sourceRowIndex;return r;});return {headers:block.headers||[],rows,sourceBlock:block};}}const parsed=parseInput(g.input,mode);return {...parsed,sourceBlock:null};}
function previewCountText(g){const shown=(visiblePreviews(g)||[]).length;const total=totalPreviewCountIfAll(g);return `${shown}/${total||shown}`}
function totalPreviewCountIfAll(g){try{const blocks=(g&&g.sourceBlocks&&g.sourceBlocks.length)?g.sourceBlocks:(sourceModeLooksHtml(g)?extractSourceCauselistBlocks(g.input):[]);if(!blocks.length)return (g.previews||[]).filter(p=>!p.removed).length;const merged=mergeSourceBlocks(blocks);const tmp={...g,headers:merged.headers,rows:merged.rows};return eligibleRows(tmp).length;}catch(e){return (g.previews||[]).filter(p=>!p.removed).length}}
function normalizeBenchText(s=''){return toNep(String(s||'').replace(/इजलास/g,'इजलाश').replace(/\s+/g,' ').trim())}
function normalizeJudgeText(s=''){return toNep(String(s||'').replace(/माननीय\s*जिल्ला\s*न्यायाधीश/g,'माननीय जिल्ला न्यायाधीश').replace(/\s+/g,' ').trim())}
function shortJudgeName(s=''){let t=normalizeJudgeText(s);t=t.replace(/^माननीय\s*जिल्ला\s*न्यायाधीश\s*/,'').replace(/^माननीय\s*न्यायाधीश\s*/,'').trim();return t||normalizeJudgeText(s)}
function judgeLooksGeneric(s=''){
  const t=normalizeJudgeText(s).replace(/\s+/g,' ').trim();
  return !t || t===DEFAULT_JUDGE || t==='माननीय जिल्ला न्यायाधीश' || t==='न्यायाधीश';
}
function extractJudgeName(s=''){
  let t=normalizeJudgeText(s);
  t=t.replace(/^माननीय\s*जिल्ला\s*न्यायाधीश\s*/,'').replace(/^माननीय\s*न्यायाधीश\s*/,'').replace(/^न्यायाधीश\s*/,'').trim();
  return t;
}
function effectiveJudgeForPreview(g,sourceBlockId=''){
  const s=(g&&g.settings)?g.settings:state.settings;
  let prefix=normalizeJudgeText(String((s&&s.judge)||DEFAULT_JUDGE).trim()||DEFAULT_JUDGE);
  // The Settings न्यायाधीश field is an independent prefix only. It is never filled from InputTable.
  // Old/legacy "माननीय जिल्ला न्यायाधीश" prefix is normalized to the requested default.
  if(!prefix || /^माननीय\s*जिल्ला\s*न्यायाधीश/.test(prefix) || prefix==='न्यायाधीश') prefix=DEFAULT_JUDGE;
  const block=selectedSourceBlockForGroup(g,sourceBlockId);
  const sourceName=extractJudgeName((block&&block.judge)||'');
  return `${prefix}${sourceName?' '+sourceName:''}`.replace(/\s+/g,' ').trim();
}
function extractBenchJudgeFromTable(table){const tr=[...table.querySelectorAll('tr')].find(r=>/इजलास|इजलाश/i.test(r.textContent)&&(/judge/i.test(r.innerHTML)||/न्यायाधीश|श्री/.test(r.textContent)));if(!tr)return null;const cells=[...tr.children];const bench=normalizeBenchText((cells[0]&&cells[0].textContent)||'');let judgeCell=tr.querySelector('.judge')||cells.find(c=>/न्यायाधीश|श्री/.test(c.textContent)&&!/इजलास|इजलाश/.test(c.textContent))||cells[1];const judge=normalizeJudgeText((judgeCell&&judgeCell.textContent)||'');if(!bench&&!judge)return null;return {bench:bench||'इजलाश',judge:judge||''};}
function tableLooksLikeCauseList(table){const text=table.textContent.replace(/\s+/g,' ');return /मुद्दा\s*न|मुद्दा\s*नं|वादी|प्रतिवादी|दर्ता\s*मिति/.test(text)}
function parseCauseTableElement(table){const trs=[...table.querySelectorAll('tr')].filter(tr=>!isNonCauseHtmlRow(tr)).map(tr=>[...tr.children].map(td=>td.textContent.trim().replace(/\s+/g,' '))).filter(r=>r.some(Boolean));return parseMatrix(trs)}
function extractSourceCauselistBlocks(raw){raw=String(raw||'').trim();if(!raw||!/<table[\s\S]*?>/i.test(raw))return [];let doc;try{doc=new DOMParser().parseFromString(raw,'text/html');}catch(e){return [];}const tables=[...doc.querySelectorAll('table')];const blocks=[];let pending=null;let serial=0;for(let i=0;i<tables.length;i++){const table=tables[i];const bj=extractBenchJudgeFromTable(table);if(bj){pending={...bj,sourceIndex:i};continue;}if(!tableLooksLikeCauseList(table))continue;const parsed=parseCauseTableElement(table);if(!parsed.rows.length)continue;if(pending){serial++;const bench=pending.bench||'इजलाश';const judge=pending.judge||'';const label=`${bench}-${shortJudgeName(judge)}${serial>1?' #'+toNep(serial):''}`;blocks.push({id:'sourceBlock_'+serial,label,bench,judge,headers:parsed.headers,rows:parsed.rows,tableIndex:i,benchTableIndex:pending.sourceIndex});pending=null;}}
  // Fallback: if no explicit bench header was found, expose each valid cause-list table as an independent block.
  if(!blocks.length){for(let i=0;i<tables.length;i++){const table=tables[i];if(!tableLooksLikeCauseList(table))continue;const parsed=parseCauseTableElement(table);if(parsed.rows.length){serial++;blocks.push({id:'sourceBlock_'+serial,label:`Causelist ${toNep(serial)}`,bench:'',judge:'',headers:parsed.headers,rows:parsed.rows,tableIndex:i});}}}
  return blocks;}

function parseInput(raw,mode='auto'){raw=String(raw||'').trim();if(!raw)return {headers:[],rows:[]};if(mode==='auto'){if(/^\s*\[/.test(raw))mode='json';else if(/<table[\s\S]*?>/i.test(raw))mode='html';else mode='text'}try{if(mode==='json')return parseJson(raw);if(mode==='html')return parseHtml(raw);return parseText(raw)}catch(e){console.error(e);return {headers:[],rows:[]}}}

function getSelectionOffsetWithin(root){
  const sel=window.getSelection&&window.getSelection();
  if(!root||!sel||!sel.rangeCount)return null;
  const range=sel.getRangeAt(0);
  if(!root.contains(range.startContainer))return null;
  const pre=document.createRange();
  pre.selectNodeContents(root);
  pre.setEnd(range.startContainer,range.startOffset);
  return pre.toString().length;
}
function setSelectionOffsetWithin(root,offset){
  if(!root||offset==null)return false;
  const target=Math.max(0,Number(offset)||0);
  const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,null);
  let node, count=0;
  while((node=walker.nextNode())){
    const len=node.nodeValue.length;
    if(count+len>=target){
      const r=document.createRange();
      r.setStart(node,Math.max(0,Math.min(len,target-count)));
      r.collapse(true);
      const sel=window.getSelection();sel.removeAllRanges();sel.addRange(r);
      return true;
    }
    count+=len;
  }
  root.focus();
  const r=document.createRange();r.selectNodeContents(root);r.collapse(false);
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(r);
  return true;
}
function rememberPreviewCursor(id,opts={}){

  if(off==null)return;
  if(!state.previewStates)state.previewStates={};
  const prev=state.previewStates[fp.g.no]||{};
  state.previewStates[fp.g.no]={...prev,activePreviewId:id,cursor:{previewId:id,offset:off},scrollY:window.scrollY||document.documentElement.scrollTop||0};
  if(!opts.silent)saveState();
}

  }

function updateActivePreviewFromViewport(){

  let best=null,score=Infinity;

    if(r.bottom<anchor || r.top>window.innerHeight-80)continue;

  if(id&&id!==state.activePreviewId)setActivePreview(id,{scrollNav:true});

function richInlineRunsFromHtml(html,fs,baseOpt={}){
  const container=document.createElement('span');container.innerHTML=html||'';
  const runs=[];
  function pushText(txt,opt){
    txt=String(txt||'').replace(/\u00a0/g,' ').replace(/[ \t\f\v]+/g,' ');
    if(txt)runs.push({text:txt,opt:{...opt}});
  }
  function walk(node,opt={}){
    if(node.nodeType===Node.TEXT_NODE){pushText(node.nodeValue,opt);return;}
    if(node.nodeType!==Node.ELEMENT_NODE)return;
    const tag=(node.tagName||'').toLowerCase();
    const style=(node.getAttribute('style')||'').toLowerCase();
    const cls=(node.getAttribute('class')||'').toLowerCase();
    const next=/\btype-text\b/.test(cls)?{}:{...opt};
    if(['b','strong'].includes(tag)||/font-weight\s*:\s*(bold|[6-9]00)/.test(style))next.bold=true;
    if(['i','em'].includes(tag)||/font-style\s*:\s*italic/.test(style))next.italic=true;
    if(['u','ins'].includes(tag)||/text-decoration[^;]*underline/.test(style))next.underline=true;
    if(tag==='br'){pushText('\n',next);return;}
    node.childNodes.forEach(ch=>walk(ch,next));
  }
  container.childNodes.forEach(ch=>walk(ch,{...baseOpt}));
  if(!runs.length && container.textContent)runs.push({text:container.textContent,opt:{...baseOpt}});
  return runs;
}

function contentTypesXml(){return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/><Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/><Override PartName="/word/settings.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.settings+xml"/><Override PartName="/word/fontTable.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.fontTable+xml"/><Override PartName="/docProps/core.xml" ContentType="application/vnd.openxmlformats-package.core-properties+xml"/><Override PartName="/docProps/app.xml" ContentType="application/vnd.openxmlformats-officedocument.extended-properties+xml"/></Types>`}

async function makeDocxBlob(items){const zip=new JSZip();let bodyXml='';items.forEach((it,idx)=>{if(idx)bodyXml+=pageBreakXml();const fs=it.settings||state.settings;bodyXml+=docPartXml(extractDocParts(it.html,fs),fs,it.previewName||it.label);});zip.file('[Content_Types].xml',contentTypesXml());zip.folder('_rels').file('.rels',relsXml());const word=zip.folder('word');word.file('document.xml',minimalDocxXml(bodyXml));word.file('styles.xml',stylesXml());word.file('settings.xml',settingsXml());word.file('fontTable.xml',fontTableXml());word.folder('_rels').file('document.xml.rels',docRelsXml());zip.folder('docProps').file('core.xml',coreXml());zip.folder('docProps').file('app.xml',appXml());return await zip.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});}
async function saveDocx(name,items){try{downloadBlob(await makeDocxBlob(items),name);toast('DOCX designated format मा download भयो','ok')}catch(e){console.error(e);toast('DOCX generation fail भयो।','danger')}}
function downloadBlob(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},500)}

document.addEventListener('click',e=>{
  if(e.target&&e.target.id==='modal')closeModal();
});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&!modal.classList.contains('hidden'))closeModal();});
window.addEventListener('scroll',()=>{window.clearTimeout(window.__previewActiveTimer);window.__previewActiveTimer=setTimeout(()=>{if(state.activeType==='preview'){const g=state.groups[state.activeIndex];if(g){if(!state.previewStates)state.previewStates={};state.previewStates[g.no]={...(state.previewStates[g.no]||{}),scrollY:window.scrollY||document.documentElement.scrollTop||0,activePreviewId:state.activePreviewId||''};}updateActivePreviewFromViewport();}},80);},{passive:true});
